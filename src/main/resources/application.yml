api:
  version: "@project.version@"
  #base-url: http://localhost:8080 todo a revoir en prod
  endpoints:
    #auth: /auth
    verify-user-path: /api/v1/auth/verify

spring:
  application:
    name: "@project.artifactId@"
  datasource:
    url: jdbc:postgresql://postgres:5432/roomify
    username: roomify
    password: roomify
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # todo certainement a revoir en production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: roomify
  graphql:
    graphiql:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    display-request-duration: true
    doc-expansion: none
    operationsSorter: method
    tagsSorter: alpha

brevo:
  api-key: ${BREVO_API_KEY}
  sender-email: roomify.dev@proton.me
  sender-name: Roomify
  base-url: https://api.brevo.com/v3
  brevo-smtp-path: /smtp/email

resilience4j:
  retry:
    instances:
      sendEmailRetry:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - com.roomify.shared.exception.TechniqueApiException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignore-exceptions:
          - com.roomify.shared.exception.ClientApiException
  ratelimiter:
    instances:
      registerUserRateLimiter:
        limitForPeriod: 5
        limitRefreshPeriod: 60s
        timeoutDuration: 0
      loginUserRateLimiter:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 0

server:
  port: 8080