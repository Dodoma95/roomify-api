services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: roomify
      POSTGRES_USER: roomify
      POSTGRES_PASSWORD: roomify
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomify"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/roomify
      SPRING_DATASOURCE_USERNAME: roomify
      SPRING_DATASOURCE_PASSWORD: roomify
    ports:
      - "8080:8080"